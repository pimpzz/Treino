<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PFORM | Peak Performance</title>
    
    <!-- Meta tags PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PFORM">
    <meta name="theme-color" content="#020617">

    <!-- CSS: Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
                background-color: #020617;
                color: #f8fafc;
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                min-height: 100vh;
                margin: 0;
            }
            h1, h2, h3, h4 {
                font-family: 'Outfit', sans-serif;
            }
        }

        .glass-shadow {
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #020617;
        }

        .mesh-bg::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 50%;
            filter: blur(120px);
        }

        .mesh-bg::after {
            content: "";
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            filter: blur(140px);
        }

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.05)',
                        'glass-border': 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Bibliotecas Externas -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@11.0.3/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script type="text/babel" data-presets="react,stage-2">
        // Usando a chave que você já configurou
        const GEMINI_API_KEY = "AIzaSyBLdfFdlMJfecsxdiBUFCBQjvIXdH0bNlg";

        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { 
            AreaChart, Area, LineChart, Line, XAxis, YAxis, 
            CartesianGrid, Tooltip, ResponsiveContainer 
        } = Recharts;

        // Helper para ícones Lucide no React
        const Icon = ({ name, color = 'currentColor', size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                try {
                    const icon = lucide.icons[name] || lucide.icons['HelpCircle'];
                    if (icon && iconRef.current) {
                        const svg = icon.toSvg({
                            stroke: color,
                            width: size,
                            height: size,
                            'stroke-width': 2,
                        });
                        iconRef.current.innerHTML = svg;
                        const svgElement = iconRef.current.firstElementChild;
                        if (svgElement && className) {
                            svgElement.classList.add(...className.split(' ').filter(c => c));
                        }
                    }
                } catch(e) { console.error("Erro no ícone:", name, e); }
            }, [name, color, size, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const Card = ({ children, className = "", title }) => (
            <motion.div
                initial={{ opacity: 0, scale: 0.98 }}
                animate={{ opacity: 1, scale: 1 }}
                className={`bg-white/5 backdrop-blur-xl rounded-[32px] p-6 border border-white/10 glass-shadow overflow-hidden relative ${className}`}
            >
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
                {title && (
                    <h3 className="text-xl font-semibold text-white mb-6 tracking-tight">{title}</h3>
                )}
                {children}
            </motion.div>
        );

        async function callGemini(prompt) {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "SUA_API_KEY_AQUI") {
                alert("Por favor, adicione sua Gemini API Key na linha 115 do seu arquivo.");
                return null;
            }
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                return JSON.parse(text);
            } catch (error) {
                console.error("Erro na API Gemini:", error);
                return null;
            }
        }

        const getMealSuggestions = async (activity, timing, goal) => {
            const prompt = `Você é um nutricionista esportivo especializado em musculação e tênis. Sugira 3 opções de refeições para um atleta de ${activity} que está no momento de ${timing}. Objetivo: ${goal}. Retorne JSON: Array<{name: string, ingredients: string[], benefits: string, macros: {prot: string, carb: string, fat: string}}>`;
            return await callGemini(prompt) || [];
        };

        function App() {
            const [activeTab, setActiveTab] = useState('workouts');
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('userProfile');
                return saved ? JSON.parse(saved) : { age: 26, weight: 80, height: 180, bodyType: 'Mesomorfo', goal: 'Hipertrofia' };
            });
            const [workouts, setWorkouts] = useState(() => JSON.parse(localStorage.getItem('workouts') || '[]'));
            const [gymTemplates, setGymTemplates] = useState(() => {
                const saved = localStorage.getItem('gymTemplates');
                return saved ? JSON.parse(saved) : [
                    { id: 'A', name: 'TREINO A', description: 'Foco em força.', exercises: [{ id: '1', name: 'Agachamento', sets: 3, reps: '10' }] }
                ];
            });
            const [activeWorkout, setActiveWorkout] = useState(() => JSON.parse(localStorage.getItem('activeWorkout') || 'null'));
            const [elapsedSeconds, setElapsedSeconds] = useState(0);
            const [mealSuggestions, setMealSuggestionsState] = useState([]);
            const [loadingNutrition, setLoadingNutrition] = useState(false);
            const [selectedActivity, setSelectedActivity] = useState('Musculação');
            const [selectedTiming, setSelectedTiming] = useState('Pré-treino');

            useEffect(() => localStorage.setItem('userProfile', JSON.stringify(userProfile)), [userProfile]);
            useEffect(() => localStorage.setItem('workouts', JSON.stringify(workouts)), [workouts]);
            useEffect(() => localStorage.setItem('gymTemplates', JSON.stringify(gymTemplates)), [gymTemplates]);
            useEffect(() => localStorage.setItem('activeWorkout', JSON.stringify(activeWorkout)), [activeWorkout]);

            useEffect(() => {
                let interval;
                if (activeWorkout) {
                    interval = setInterval(() => {
                        setElapsedSeconds(Math.floor((Date.now() - activeWorkout.timestamp) / 1000));
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [activeWorkout]);

            const startWorkout = (template) => {
                setActiveWorkout({
                    id: Math.random().toString(36).substr(2, 9),
                    date: new Date().toLocaleDateString('pt-BR'),
                    notes: template.name,
                    timestamp: Date.now(),
                    exercises: template.exercises.map(ex => ({ ...ex, completed: false, weight: '' }))
                });
                setActiveTab('workouts');
            };

            const finishWorkout = () => {
                setWorkouts([{ ...activeWorkout, duration: elapsedSeconds, timestamp: Date.now() }, ...workouts].slice(0, 50));
                setActiveWorkout(null);
            };

            const handleFetchNutrition = async () => {
                setLoadingNutrition(true);
                const s = await getMealSuggestions(selectedActivity, selectedTiming, userProfile.goal);
                setMealSuggestionsState(s || []);
                setLoadingNutrition(false);
            };

            return (
                <div className="min-h-screen font-sans pb-32">
                    <div className="mesh-bg" />

                    <header className="p-8 max-w-lg mx-auto">
                        <div className="flex justify-between items-center">
                            <h1 className="text-3xl font-bold tracking-tight text-white">PFORM</h1>
                            <div onClick={() => setActiveTab('profile')} className="flex items-center gap-4 bg-white/5 p-2 pr-4 rounded-2xl border border-white/10 cursor-pointer">
                                <div className="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center">
                                    <Icon name="User" color="#3b82f6" size={20} />
                                </div>
                                <div>
                                    <p className="text-[9px] font-black text-slate-500 uppercase">{userProfile.bodyType}</p>
                                    <p className="text-xs font-bold text-white">{userProfile.weight} KG</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-lg mx-auto px-6">
                        <AnimatePresence mode="wait">
                            {activeTab === 'workouts' && (
                                <motion.div key="workouts" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="space-y-6">
                                    {activeWorkout ? (
                                        <Card title="Treino Ativo">
                                            <div className="flex justify-between items-center mb-6">
                                                <p className="text-2xl font-black text-white flex items-center gap-2">
                                                    <Icon name="Timer" color="#3b82f6" className="animate-pulse" />
                                                    {Math.floor(elapsedSeconds/60)}:{(elapsedSeconds%60).toString().padStart(2, '0')}
                                                </p>
                                                <button onClick={finishWorkout} className="bg-emerald-500 px-6 py-3 rounded-2xl font-black text-xs uppercase text-white">Finalizar</button>
                                            </div>
                                            <div className="space-y-4">
                                                {activeWorkout.exercises.map(ex => (
                                                    <div key={ex.id} className="p-4 rounded-2xl bg-white/5 border border-white/5 flex items-center justify-between">
                                                        <p className="font-bold text-white">{ex.name}</p>
                                                        <span className="text-xs text-slate-400">{ex.sets}x{ex.reps}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </Card>
                                    ) : (
                                        <div className="space-y-4">
                                            {workouts.length === 0 && <p className="text-center text-slate-500 py-10">Nenhum treino registrado.</p>}
                                            {workouts.map(w => (
                                                <Card key={w.id} title={w.notes}>
                                                    <p className="text-xs text-slate-500 uppercase font-black">{w.date}</p>
                                                </Card>
                                            ))}
                                        </div>
                                    )}
                                </motion.div>
                            )}

                            {activeTab === 'gym' && (
                                <motion.div key="gym" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="space-y-6">
                                    {gymTemplates.map(t => (
                                        <Card key={t.id} title={t.name}>
                                            <button onClick={() => startWorkout(t)} className="w-full bg-blue-600 py-3 rounded-2xl font-black uppercase text-xs text-white">Iniciar Treino</button>
                                        </Card>
                                    ))}
                                </motion.div>
                            )}
                            
                            {activeTab === 'nutrition' && (
                                <motion.div key="nutrition" className="space-y-6">
                                    <div className="bg-white/5 p-4 rounded-3xl border border-white/10 space-y-4">
                                        <button onClick={handleFetchNutrition} disabled={loadingNutrition} className="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase">
                                            {loadingNutrition ? 'Gerando...' : 'Obter Dietas IA'}
                                        </button>
                                    </div>
                                    {mealSuggestions.map((m, i) => (
                                        <Card key={i} title={m.name}>
                                            <p className="text-sm text-slate-400">{m.benefits}</p>
                                        </Card>
                                    ))}
                                </motion.div>
                            )}

                            {activeTab === 'profile' && (
                                <motion.div key="profile" className="space-y-6">
                                    <Card title="Perfil">
                                        <p className="text-slate-400">Peso: {userProfile.weight}kg</p>
                                        <p className="text-slate-400">Objetivo: {userProfile.goal}</p>
                                    </Card>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg px-6 pb-8 pt-4 bg-slate-950/80 backdrop-blur-3xl border-t border-white/5 z-50">
                        <div className="flex justify-around items-center">
                            {[
                                {id: 'workouts', icon: 'Calendar', label: 'Sessions'},
                                {id: 'gym', icon: 'Dumbbell', label: 'Gym'},
                                {id: 'nutrition', icon: 'Utensils', label: 'Nutrition'},
                                {id: 'profile', icon: 'User', label: 'Profile'}
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center gap-1.5 ${activeTab === item.id ? 'text-blue-500' : 'text-slate-500'}`}>
                                    <Icon name={item.icon} size={24} color={activeTab === item.id ? '#3b82f6' : '#64748b'} />
                                    <span className="text-[9px] font-black uppercase">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
